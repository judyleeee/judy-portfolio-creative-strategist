    .nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-height);
      background-color: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }
    .nav__inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 100%; max-width: var(--content-max-width);
      margin: 0 auto; padding: 0 var(--content-padding-x);
    }
    .nav__logo {
      font-size: var(--text-small); font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-wide); text-transform: uppercase;
      color: var(--color-text-primary);
    }
    .nav__links { display: flex; gap: var(--space-6); align-items: center; }
    .nav__links > a {
      font-size: var(--text-small); font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
      transition: color var(--transition-fast);
    }
    .nav__links > a:hover { color: var(--color-text-primary); }

    .placeholder {
      max-width: 680px;
      margin: var(--space-10) auto var(--space-9);
      padding: 0 var(--content-padding-x);
    }
    .placeholder__label {
      display: block; font-size: var(--text-caption);
      font-weight: var(--weight-medium); letter-spacing: var(--tracking-wide);
      text-transform: uppercase; color: var(--color-text-tertiary);
      margin-bottom: var(--space-4);
    }
    .placeholder__title {
      font-size: var(--text-h1); font-weight: var(--weight-light);
      color: var(--color-text-primary); margin-bottom: var(--space-4);
      line-height: var(--leading-tight);
    }
    .placeholder__body {
      font-size: var(--text-body); color: var(--color-text-secondary);
      line-height: var(--leading-loose);
    }
    .placeholder__link {
      display: inline-block; margin-top: var(--space-5);
      font-size: var(--text-small); color: var(--color-text-primary);
      border-bottom: 1px solid currentColor; padding-bottom: 2px;
      transition: opacity var(--transition-fast);
    }
    .placeholder__link:hover { opacity: 0.6; }
  </style>
</head>
